name: omanido

services:
  web:
    build: .
    container_name: omanido_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: omanido_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: test
    ports:
      - "3307:3306"
    volumes:
      - omanido_db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: omanido_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  omanido_db_data: